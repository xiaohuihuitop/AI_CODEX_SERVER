name: Build Docker Image

on:
  push:
    tags:
      - "build-*"

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build image artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            desktop/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Run tests
        working-directory: server
        run: npm test

      - name: Run syntax check
        working-directory: server
        run: npm run check

      - name: Set image metadata
        shell: bash
        run: |
          echo "TAG_NAME=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=ai-codex-server:${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "IMAGE_LATEST=ai-codex-server:latest" >> "$GITHUB_ENV"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          tags: |
            ${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_LATEST }}
          outputs: type=docker,dest=ai-codex-server-${{ env.TAG_NAME }}.tar
          provenance: false

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-codex-server-${{ env.TAG_NAME }}
          path: ai-codex-server-${{ env.TAG_NAME }}.tar
          if-no-files-found: error
          retention-days: 30

      - name: Prepare release files
        run: cp server/.env.example env.example

      - name: Publish image to GitHub Release
        if: startsWith(github.ref, 'refs/tags/build-')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}
          generate_release_notes: true
          files: |
            ai-codex-server-${{ env.TAG_NAME }}.tar
            server/docker-compose.yml
            env.example
